<svg xmlns="http://www.w3.org/2000/svg" width="900" height="820" viewBox="0 0 900 820">
  <style>
    .title { font: 700 28px Arial, sans-serif; fill: #1f2937; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 18; ry: 18; }
    .text { font: 600 20px Arial, sans-serif; fill: #111827; text-anchor: middle; }
    .sub { font: 400 16px Arial, sans-serif; fill: #475569; text-anchor: middle; }
    .arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="450" y="50" class="title">Dynamic Fleet Failure & Delay Forecasting System</text>
  <rect x="220" y="100" width="460" height="90" class="box"/>
  <text x="450" y="138" class="text">Latent System State</text>
  <text x="450" y="165" class="sub">vehicle health / route stress</text>
  <rect x="220" y="245" width="460" height="90" class="box"/>
  <text x="450" y="283" class="text">Kalman Filtering Layer</text>
  <text x="450" y="310" class="sub">State estimation and denoising</text>
  <rect x="220" y="390" width="460" height="90" class="box"/>
  <text x="450" y="428" class="text">Feature Engineering</text>
  <text x="450" y="455" class="sub">Rolling stats, composite observation, derived signals</text>
  <rect x="220" y="535" width="460" height="90" class="box"/>
  <text x="450" y="573" class="text">Hybrid ML Risk Model</text>
  <text x="450" y="600" class="sub">breakdown and delay risk</text>
  <rect x="220" y="680" width="460" height="90" class="box"/>
  <text x="450" y="718" class="text">Causal Intervention Analysis</text>
  <text x="450" y="745" class="sub">preventive maintenance</text>
  <path d="M 450 190 L 450 245" class="arrow"/>
  <path d="M 450 335 L 450 390" class="arrow"/>
  <path d="M 450 480 L 450 535" class="arrow"/>
  <path d="M 450 625 L 450 680" class="arrow"/>
</svg>